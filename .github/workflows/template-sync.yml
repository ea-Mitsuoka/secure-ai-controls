# Distributes template updates to this repo from its DIRECT PARENT template: opens a PR
# whenever the parent changes (files listed in .templatesyncignore are never touched).
#
# Parent is terraform-gcp-template (ADR-0005). This file-based transport is the INTERIM
# path only: the source of truth for parentage is .github/inheritance/manifest.json, and
# ADR-0004's commit-based inheritance (scripts/template_inheritance.py) replaces this once
# its materialization step ships. Keep both pointed at the same parent to avoid a footgun.
#
# OPT-IN and safe by default: the job only runs when the repository variable
# TEMPLATE_SYNC_ENABLED is set to "true" (currently unset — sync is off).
name: Template Sync

on:
  schedule:
    - cron: "0 7 * * 1"   # weekly, Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    if: vars.TEMPLATE_SYNC_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: AndreasAugustin/actions-template-sync@v2
        with:
          source_repo_path: "Yukihide-Mitsuoka/terraform-gcp-template"
          upstream_branch: main
          pr_title: "build: sync with terraform-gcp-template parent"
          pr_labels: "type:ci,type:dependencies"
          pr_commit_msg: "build: sync with terraform-gcp-template parent"
