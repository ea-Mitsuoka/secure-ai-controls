# IaC misconfiguration scan (Terraform / Kubernetes / CloudFormation / Helm) — SEC-021.
name: IaC Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  iac-scan:
    name: iac-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - name: Detect changed IaC
        id: changes
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          zero=0000000000000000000000000000000000000000
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "$zero" ] \
             || ! git cat-file -e "$BASE_SHA^{commit}" \
             || ! git cat-file -e "$HEAD_SHA^{commit}"; then
            echo "iac=true" >> "$GITHUB_OUTPUT"
            echo "Cannot prove the changed range — running the full IaC scan."
          else
            changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" --)"
            if printf '%s\n' "$changed_files" \
              | grep -Eq '(^|/)[^/]+\.tf(vars)?$|^infra/|^k8s/|^helm/'; then
              echo "iac=true" >> "$GITHUB_OUTPUT"
              echo "IaC changes detected — running the full IaC scan."
            else
              echo "iac=false" >> "$GITHUB_OUTPUT"
              echo "No IaC changes detected — reporting success without invoking scanners."
            fi
          fi
      - name: No IaC changes
        if: steps.changes.outputs.iac == 'false'
        run: echo "No IaC changes detected."
      - name: Trivy config scan
        if: steps.changes.outputs.iac == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: "1"
      - name: Checkov (second opinion — defense in depth)
        if: steps.changes.outputs.iac == 'true'
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf # v12.1347.0
        with:
          soft_fail: false
          quiet: true
