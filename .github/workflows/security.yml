# Security scans on every PR: secrets, dependency vulns, licenses (SEC-002/030, REL-030).
name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"   # daily: new CVEs appear without code changes

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history — leaked-then-deleted secrets still count (GR-001)
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Org use requires GITLEAKS_LICENSE (free for individuals/OSS):
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy — vulnerabilities & misconfig (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy — license policy (REL-030)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: license
          severity: HIGH,CRITICAL   # forbidden/restricted license categories
          exit-code: "1"
